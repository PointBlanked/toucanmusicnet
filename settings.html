<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Toucan Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js" defer></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="nav">
    <a class="brand" href="index.html"><span class="brand-beak"></span>Toucan Music</a>
    <div class="nav-links">
      <a class="nav-icon-link" href="index.html" aria-label="Home" data-tooltip="Home"><iconify-icon icon="pixelarticons:home" aria-hidden="true"></iconify-icon></a>
      <a class="nav-icon-link" href="calendar.html?v=2" aria-label="Calendar" data-tooltip="Calendar"><iconify-icon icon="pixelarticons:calendar" aria-hidden="true"></iconify-icon></a>
      <span data-nav-auth style="display:flex;gap:1rem;align-items:center"></span>
    </div>
  </nav>

  <main class="auth-wrap wide">
    <div class="panel rise">
      <h1>Settings</h1>
      <p class="sub" id="who">Notification preferences for your account.</p>

      <section class="settings-group" aria-labelledby="notification-title">
        <div class="settings-group-head">
          <span class="settings-icon" aria-hidden="true"><iconify-icon icon="pixelarticons:bell"></iconify-icon></span>
          <div><h2 id="notification-title">Notifications</h2><p>Choose what reaches you between visits.</p></div>
        </div>

      <label class="toggle-row" for="pref-digest">
        <span class="settings-row-icon" aria-hidden="true"><iconify-icon icon="pixelarticons:mail"></iconify-icon></span>
        <span class="setting-copy">
          <strong>Weekly schedule email</strong>
          <p>Every Monday morning: the classes and events coming up this week, in one email.</p>
        </span>
        <span class="setting-status" data-status-for="pref-digest">On</span>
        <span class="switch">
          <input type="checkbox" id="pref-digest" aria-label="Weekly schedule email" />
          <span class="track"></span>
        </span>
      </label>

      <label class="toggle-row" for="pref-reminders">
        <span class="settings-row-icon" aria-hidden="true"><iconify-icon icon="pixelarticons:bell-ring"></iconify-icon></span>
        <span class="setting-copy">
          <strong>Class reminders</strong>
          <p>A nudge an hour before and thirty minutes before each upcoming class or event — by email, and on-screen while you have the site open.</p>
        </span>
        <span class="setting-status" data-status-for="pref-reminders">On</span>
        <span class="switch">
          <input type="checkbox" id="pref-reminders" aria-label="Class reminders" />
          <span class="track"></span>
        </span>
      </label>
      </section>

      <section class="settings-group tutorial-setting" aria-labelledby="guide-title">
        <div class="settings-group-head">
          <span class="settings-icon" aria-hidden="true"><iconify-icon icon="pixelarticons:book-open"></iconify-icon></span>
          <div><h2 id="guide-title">Site guide</h2><p>Revisit the calendar walkthrough whenever you need it.</p></div>
        </div>
        <button class="btn guide-btn" id="start-tutorial" type="button"><iconify-icon icon="pixelarticons:play" aria-hidden="true"></iconify-icon>Start tutorial</button>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js?v=2"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/background.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = await ToucanAPI.getSession();
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      document.getElementById("who").textContent =
        "Notification preferences for " + user.name + " (" + user.role + ").";
      const digest = document.getElementById("pref-digest");
      const reminders = document.getElementById("pref-reminders");
      digest.checked = user.weekly_digest !== false;
      reminders.checked = user.class_reminders !== false;

      function updateStatus(input) {
        const status = document.querySelector(`[data-status-for="${input.id}"]`);
        status.textContent = input.checked ? "On" : "Off";
        status.classList.toggle("is-off", !input.checked);
      }
      updateStatus(digest);
      updateStatus(reminders);

      async function save() {
        updateStatus(digest);
        updateStatus(reminders);
        try {
          await ToucanAPI.updatePrefs({
            weekly_digest: digest.checked,
            class_reminders: reminders.checked,
          });
          toast("Preferences saved.");
        } catch (ex) {
          toast(ex.message, "error");
        }
      }
      digest.addEventListener("change", save);
      reminders.addEventListener("change", save);
      document.getElementById("start-tutorial").addEventListener("click", () => {
        ToucanTour.replay(user);
      });
    });
  </script>
</body>
</html>
