<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join us — Toucan Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="nav">
    <a class="brand" href="index.html"><span class="brand-beak"></span>Toucan Music</a>
    <div class="nav-links">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="calendar.html">Calendar</a>
      <span data-nav-auth style="display:flex;gap:1rem;align-items:center"></span>
    </div>
  </nav>

  <main class="auth-wrap wide">
    <div class="panel rise">
      <h1>Join Toucan Music</h1>
      <p class="sub">First, tell us who you are — that decides what you can do on the calendar.</p>
      <div class="form-error" id="error" role="alert"></div>
      <form id="signup-form" novalidate>
        <fieldset class="role-choice" style="border:0">
          <legend class="sr-only" style="position:absolute;left:-9999px">Choose your role</legend>
          <label class="role-card">
            <input type="radio" name="role" value="student" required />
            <span class="glyph role-mark role-mark-student" aria-hidden="true"></span>
            <strong>I'm a student</strong>
            <span>Take free classes, borrow an instrument, and play in showcase nights.</span>
          </label>
          <label class="role-card">
            <input type="radio" name="role" value="volunteer" />
            <span class="glyph role-mark role-mark-volunteer" aria-hidden="true"></span>
            <strong>I'm a volunteer</strong>
            <span>Claim open volunteer spots on classes and events, and see how many are left.</span>
          </label>
        </fieldset>
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required />
          <p class="hint">Weekly schedules and class reminders go here. You can turn either off in Settings.</p>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="new-password" minlength="8" required />
          <p class="hint">At least 8 characters.</p>
        </div>
        <button class="btn btn-beak" type="submit" id="submit" style="width:100%">Create account</button>
      </form>
      <p class="hint" style="margin-top:1.2rem">Already have an account? <a href="login.html">Log in</a>.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/background.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("error");
      const btn = document.getElementById("submit");
      const role = document.querySelector('input[name="role"]:checked');
      err.classList.remove("show");
      if (!role) {
        err.textContent = "Choose whether you're joining as a student or a volunteer.";
        err.classList.add("show");
        return;
      }
      btn.disabled = true;
      btn.textContent = "Creating account…";
      try {
        await ToucanAPI.signup({
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
          role: role.value,
        });
        window.location.href = "calendar.html";
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Create account";
      }
    });
  </script>
</body>
</html>
