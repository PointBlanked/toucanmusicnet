<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Toucan Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js" defer></script>
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <nav class="nav" data-site-nav>
    <a class="brand" href="index.html"><span class="brand-beak"></span>Toucan Music</a>
    <div class="nav-links">
      <a class="nav-icon-link" href="index.html" aria-label="Home" data-tooltip="Home"><iconify-icon icon="pixelarticons:home" aria-hidden="true"></iconify-icon></a>
      <a class="nav-icon-link" href="calendar.html?v=2" aria-label="Calendar" data-tooltip="Calendar"><iconify-icon icon="pixelarticons:calendar" aria-hidden="true"></iconify-icon></a>
      <span class="nav-auth" data-nav-auth>
        <button class="nav-icon-button" type="button" data-open-settings aria-label="Settings" data-tooltip="Settings"><iconify-icon icon="pixelarticons:settings-cog" aria-hidden="true"></iconify-icon></button>
        <a class="nav-icon-link" href="login.html" aria-current="page" aria-label="Log in" data-tooltip="Log in"><iconify-icon icon="pixelarticons:login" aria-hidden="true"></iconify-icon></a>
        <a class="btn btn-beak btn-sm nav-join" href="signup.html"><iconify-icon icon="pixelarticons:user-plus" aria-hidden="true"></iconify-icon>Join us</a>
      </span>
    </div>
  </nav>

  <main class="auth-wrap">
    <div class="panel rise">
      <h1>Welcome back</h1>
      <p class="sub">Log in to see your classes, volunteer spots, and settings.</p>
      <div class="form-error" id="error" role="alert"></div>
      <form id="login-form" novalidate>
        <div class="field">
          <label for="identifier">Email (or admin name)</label>
          <input type="text" id="identifier" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <button class="btn btn-beak" type="submit" id="submit" style="width:100%">Log in</button>
      </form>
      <p class="hint" style="margin-top:1.2rem">New here? <a href="signup.html">Create an account</a> as a student or a volunteer.</p>
    </div>
  </main>

  <footer data-site-footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js?v=2"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/background.js"></script>
  <script src="js/app.js?v=4"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("error");
      const btn = document.getElementById("submit");
      err.classList.remove("show");
      btn.disabled = true;
      btn.textContent = "Logging in…";
      try {
        const user = await ToucanAPI.login(
          document.getElementById("identifier").value,
          document.getElementById("password").value
        );
        ToucanTour.queueFirstVisit(user);
        window.location.href = "calendar.html?v=2";
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
