<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — Toucan Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="nav">
    <a class="brand" href="index.html"><span class="brand-beak"></span>Toucan Music</a>
    <div class="nav-links">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="calendar.html" aria-current="page">Calendar</a>
      <span data-nav-auth style="display:flex;gap:1rem;align-items:center"></span>
    </div>
  </nav>

  <main class="cal-page">
    <div class="cal-head rise">
      <h1>Classes &amp; events</h1>
      <button class="btn btn-sm" id="prev" aria-label="Previous month">←</button>
      <span class="cal-title" id="cal-title"></span>
      <button class="btn btn-sm" id="next" aria-label="Next month">→</button>
      <button class="btn btn-beak btn-sm" id="new-event" hidden>+ New event</button>
    </div>

    <div class="cal-grid rise" id="cal-grid" aria-label="Monthly calendar"></div>

    <div class="cal-legend rise">
      <span class="k-class"><i></i>Class</span>
      <span class="k-event"><i></i>Event</span>
    </div>
  </main>

  <!-- event details -->
  <div class="modal-backdrop" id="detail-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="d-title">
      <h2 id="d-title"></h2>
      <p class="when" id="d-when"></p>
      <p class="meta" id="d-location"></p>
      <p id="d-description"></p>
      <div id="d-volunteer" style="margin-top:1.2rem"></div>
      <div id="d-roster" style="margin-top:1rem"></div>
      <div class="modal-actions">
        <button class="btn btn-quiet" data-close>Close</button>
        <button class="btn btn-sm" id="d-edit" hidden>Edit</button>
        <button class="btn btn-sm btn-danger" id="d-delete" hidden>Delete</button>
      </div>
    </div>
  </div>

  <!-- admin: create / edit event -->
  <div class="modal-backdrop" id="edit-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="e-title">
      <h2 id="e-title">New event</h2>
      <div class="form-error" id="e-error" role="alert"></div>
      <form id="event-form" novalidate>
        <div class="field">
          <label for="f-title">Title</label>
          <input type="text" id="f-title" required />
        </div>
        <div class="field">
          <label for="f-type">Type</label>
          <select id="f-type">
            <option value="class">Class</option>
            <option value="event">Event</option>
          </select>
        </div>
        <div class="field">
          <label for="f-start">Starts</label>
          <input type="datetime-local" id="f-start" required />
        </div>
        <div class="field">
          <label for="f-end">Ends</label>
          <input type="datetime-local" id="f-end" required />
        </div>
        <div class="field">
          <label for="f-location">Location</label>
          <input type="text" id="f-location" />
        </div>
        <div class="field">
          <label for="f-capacity">Volunteer spots</label>
          <input type="number" id="f-capacity" min="0" max="99" value="2" required />
          <p class="hint">Volunteers can only sign up until this many spots are taken.</p>
        </div>
        <div class="field">
          <label for="f-description">Description</label>
          <textarea id="f-description"></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn btn-quiet" type="button" data-close>Cancel</button>
          <button class="btn btn-beak" type="submit" id="f-save">Save event</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/background.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
