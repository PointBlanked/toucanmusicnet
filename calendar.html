<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — Toucan Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.7.0/dist/driver.css" />
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js" defer></script>
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <nav class="nav" data-site-nav>
    <a class="brand" href="index.html"><span class="brand-beak"></span>Toucan Music</a>
    <div class="nav-links">
      <a class="nav-icon-link" href="index.html" aria-label="Home" data-tooltip="Home"><iconify-icon icon="pixelarticons:home" aria-hidden="true"></iconify-icon></a>
      <a class="nav-icon-link" href="calendar.html?v=2" aria-current="page" aria-label="Calendar" data-tooltip="Calendar"><iconify-icon icon="pixelarticons:calendar" aria-hidden="true"></iconify-icon></a>
      <span class="nav-auth" data-nav-auth>
        <button class="nav-icon-button" type="button" data-open-settings aria-label="Settings" data-tooltip="Settings"><iconify-icon icon="pixelarticons:settings-cog" aria-hidden="true"></iconify-icon></button>
        <a class="nav-icon-link" href="login.html" aria-label="Log in" data-tooltip="Log in"><iconify-icon icon="pixelarticons:login" aria-hidden="true"></iconify-icon></a>
        <a class="btn btn-beak btn-sm nav-join" href="signup.html"><iconify-icon icon="pixelarticons:user-plus" aria-hidden="true"></iconify-icon>Join us</a>
      </span>
    </div>
  </nav>

  <main class="cal-page">
    <div class="cal-head rise">
      <h1>Classes &amp; events</h1>
      <button class="btn btn-sm icon-btn" id="prev" aria-label="Previous month" data-tooltip="Previous month"><iconify-icon icon="pixelarticons:chevron-left" aria-hidden="true"></iconify-icon></button>
      <span class="cal-title" id="cal-title"></span>
      <button class="btn btn-sm icon-btn" id="next" aria-label="Next month" data-tooltip="Next month"><iconify-icon icon="pixelarticons:chevron-right" aria-hidden="true"></iconify-icon></button>
      <button class="btn btn-beak btn-sm" id="new-event" hidden><iconify-icon icon="pixelarticons:calendar-plus" aria-hidden="true"></iconify-icon>New event</button>
    </div>

    <div class="calendar-layout">
      <section class="calendar-main rise" aria-label="Monthly calendar">
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-legend">
          <span class="k-class"><i></i>Class</span>
          <span class="k-event"><i></i>Event</span>
        </div>
      </section>

      <aside class="day-panel rise" id="day-panel" aria-live="polite">
        <div class="day-panel-head">
          <span class="day-panel-icon" aria-hidden="true"><iconify-icon icon="pixelarticons:calendar"></iconify-icon></span>
          <div>
            <p class="day-panel-kicker">Selected day</p>
            <h2 id="selected-day-title"></h2>
          </div>
        </div>
        <div class="day-panel-toolbar">
          <p id="selected-day-summary"></p>
          <button class="btn btn-beak btn-sm" id="day-new-event" hidden><iconify-icon icon="pixelarticons:calendar-plus" aria-hidden="true"></iconify-icon>Add event</button>
        </div>
        <div class="day-event-list" id="day-event-list"></div>
      </aside>
    </div>
  </main>

  <!-- admin: create / edit event -->
  <div class="modal-backdrop" id="edit-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="e-title">
      <h2 id="e-title">New event</h2>
      <div class="form-error" id="e-error" role="alert"></div>
      <form id="event-form" novalidate>
        <div class="field">
          <label for="f-title">Title</label>
          <input type="text" id="f-title" required />
        </div>
        <div class="field">
          <label for="f-type">Type</label>
          <select id="f-type">
            <option value="class">Class</option>
            <option value="event">Event</option>
          </select>
        </div>
        <div class="field">
          <label for="f-start">Starts</label>
          <input type="datetime-local" id="f-start" required />
        </div>
        <div class="field">
          <label for="f-end">Ends</label>
          <input type="datetime-local" id="f-end" required />
        </div>
        <div class="field">
          <label for="f-location">Location</label>
          <input type="text" id="f-location" />
        </div>
        <div class="field">
          <label for="f-capacity">Volunteer spots</label>
          <input type="number" id="f-capacity" min="0" max="99" value="2" required />
          <p class="hint">Volunteers can only sign up until this many spots are taken.</p>
        </div>
        <div class="field">
          <label for="f-description">Description</label>
          <textarea id="f-description"></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn btn-quiet" type="button" data-close>Cancel</button>
          <button class="btn btn-beak" type="submit" id="f-save">Save event</button>
        </div>
      </form>
    </div>
  </div>

  <footer data-site-footer></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.7.0/dist/driver.js.iife.js"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/background.js"></script>
  <script src="js/app.js?v=4"></script>
  <script src="js/calendar.js?v=3"></script>
</body>
</html>
